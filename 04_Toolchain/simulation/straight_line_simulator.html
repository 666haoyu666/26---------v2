&lt;style&gt;

&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&#x27;vehicle-motion-simulator-v1&#x27;);
  const playButton = root.querySelector(&#x27;#vms-play&#x27;);
  const restartButton = root.querySelector(&#x27;#vms-restart&#x27;);
  const rateSelect = root.querySelector(&#x27;#vms-rate&#x27;);
  const scenarioSelect = root.querySelector(&#x27;#vms-scenario&#x27;);
  const portSignSelect = root.querySelector(&#x27;#vms-port-sign&#x27;);
  const timeline = root.querySelector(&#x27;#vms-timeline&#x27;);
  const timelineValue = root.querySelector(&#x27;#vms-timeline-value&#x27;);
  const controls = {
    tau: root.querySelector(&#x27;#vms-tau&#x27;),
    delay: root.querySelector(&#x27;#vms-delay&#x27;),
    leftGain: root.querySelector(&#x27;#vms-left-gain&#x27;),
    k1: root.querySelector(&#x27;#vms-k1&#x27;),
    k2: root.querySelector(&#x27;#vms-k2&#x27;)
  };
  const valueNodes = {
    tau: root.querySelector(&#x27;#vms-tau-value&#x27;),
    delay: root.querySelector(&#x27;#vms-delay-value&#x27;),
    leftGain: root.querySelector(&#x27;#vms-left-gain-value&#x27;),
    k1: root.querySelector(&#x27;#vms-k1-value&#x27;),
    k2: root.querySelector(&#x27;#vms-k2-value&#x27;)
  };
  const liveNodes = {
    time: root.querySelector(&#x27;#vms-time&#x27;),
    error: root.querySelector(&#x27;#vms-error&#x27;),
    yaw: root.querySelector(&#x27;#vms-yaw&#x27;),
    turn: root.querySelector(&#x27;#vms-turn&#x27;),
    sensor: root.querySelector(&#x27;#vms-sensor&#x27;)
  };
  const ground = root.querySelector(&#x27;#vms-ground&#x27;);
  const trail = root.querySelector(&#x27;#vms-trail&#x27;);
  const car = root.querySelector(&#x27;#vms-car&#x27;);
  const errorLine = root.querySelector(&#x27;#vms-error-line&#x27;);
  const errorLabel = root.querySelector(&#x27;#vms-error-label&#x27;);
  const sensorDots = Array.from(root.querySelectorAll(&#x27;.vms-sensor-dot&#x27;));
  const detail = root.querySelector(&#x27;#vms-detail&#x27;);
  const positions = [-39.7, -25.2, -10.7, 0, 10.7, 25.2, 39.7];
  const config = {
    dt: 0.01,
    duration: 12,
    speed: 200,
    wheelTrack: 135,
    sensorToAxle: 160,
    lineWidth: 20,
    alpha: 0.2,
    lostHold: 10,
    centerX: 360,
    carY: 360,
    lateralScale: 1.1,
    alongScale: 0.22
  };
  const svgNs = &#x27;http://www.w3.org/2000/svg&#x27;;
  const reduceMotion = window.matchMedia(&#x27;(prefers-reduced-motion: reduce)&#x27;).matches;
  let rows = [];
  let index = 0;
  let playing = !reduceMotion;
  let lastFrame = null;
  let frameId = 0;

  function signed(value, digits) {
    const fixed = value.toFixed(digits);
    return value &gt;= 0 ? `+${fixed}` : fixed;
  }

  function sense(rearY, yaw) {
    const frontY = rearY + config.sensorToAxle * Math.sin(yaw);
    const hits = positions.map((pos) =&gt; {
      const probeY = frontY + pos * Math.cos(yaw);
      return Math.abs(probeY) &lt;= config.lineWidth / 2;
    });
    const count = hits.filter(Boolean).length;
    let runs = 0;
    let inRun = false;
    hits.forEach((hit) =&gt; {
      if (hit &amp;&amp; !inRun) runs += 1;
      inRun = hit;
    });
    let bitmap = 0;
    hits.forEach((hit, bit) =&gt; {
      if (hit) bitmap |= (1 &lt;&lt; bit);
    });
    if (count === 0) return {state: &#x27;no-line&#x27;, raw: 0, bitmap};
    if (runs &gt;= 2 || count === positions.length) {
      return {state: &#x27;ambiguous&#x27;, raw: 0, bitmap};
    }
    let sum = 0;
    hits.forEach((hit, bit) =&gt; {
      if (hit) sum += positions[bit];
    });
    return {state: &#x27;valid&#x27;, raw: sum / count, bitmap};
  }

  function simulate() {
    const tau = Number(controls.tau.value) / 1000;
    const delaySteps = Math.round(Number(controls.delay.value) / 10);
    const leftGain = Number(controls.leftGain.value) / 100;
    const portSign = Number(portSignSelect.value);
    const k1 = Number(controls.k1.value) / 100;
    const k2 = Number(controls.k2.value) / 100;
    let yaw = scenarioSelect.value === &#x27;slanted&#x27; ? 10 * Math.PI / 180 : 0;
    let rearY = scenarioSelect.value === &#x27;slanted&#x27;
      ? -config.sensorToAxle * Math.sin(yaw)
      : 30;
    let x = 0;
    let leftActual = 0;
    let rightActual = 0;
    let filtered = 0;
    let leftCommand = 0;
    let rightCommand = 0;
    const leftQueue = Array(delaySteps).fill(0);
    const rightQueue = Array(delaySteps).fill(0);
    const result = [];

    for (let step = 0; step &lt;= config.duration / config.dt; step += 1) {
      const sensed = sense(rearY, yaw);
      let trackError = filtered;
      if (sensed.state === &#x27;valid&#x27;) {
        const bodyError = portSign * sensed.raw;
        filtered = config.alpha * bodyError + (1 - config.alpha) * filtered;
        trackError = filtered;
      } else if (sensed.state === &#x27;no-line&#x27;) {
        trackError = Math.abs(filtered) &gt; config.lostHold ? filtered : 0;
      }
      const yawErrorDeg = -yaw * 180 / Math.PI;
      const rearEstimate = trackError + config.sensorToAxle * Math.sin(yawErrorDeg * Math.PI / 180);
      const wCommandDeg = k2 * yawErrorDeg - k1 * rearEstimate;
      const diff = wCommandDeg * Math.PI / 180 * config.wheelTrack / 2;
      leftCommand = config.speed + diff;
      rightCommand = config.speed - diff;
      result.push({
        time: step * config.dt,
        x,
        rearY,
        yawDeg: yaw * 180 / Math.PI,
        rearEstimate,
        wCommandDeg,
        leftCommand,
        rightCommand,
        leftActual,
        rightActual,
        bitmap: sensed.bitmap,
        sensorState: sensed.state
      });
      if (step === config.duration / config.dt) break;

      leftQueue.push(leftCommand);
      rightQueue.push(rightCommand);
      const delayedLeft = delaySteps &gt; 0 ? leftQueue.shift() : leftQueue.pop();
      const delayedRight = delaySteps &gt; 0 ? rightQueue.shift() : rightQueue.pop();
      const leftTarget = delayedLeft * leftGain;
      const rightTarget = delayedRight;
      if (tau === 0) {
        leftActual = leftTarget;
        rightActual = rightTarget;
      } else {
        const alpha = Math.min(1, config.dt / tau);
        leftActual += alpha * (leftTarget - leftActual);
        rightActual += alpha * (rightTarget - rightActual);
      }
      const speed = (leftActual + rightActual) / 2;
      const wActual = (leftActual - rightActual) / config.wheelTrack;
      x += speed * Math.cos(yaw) * config.dt;
      rearY += speed * Math.sin(yaw) * config.dt;
      yaw += wActual * config.dt;
    }
    return result;
  }

  function drawGround(row) {
    ground.replaceChildren();
    const spacing = 200;
    const first = Math.floor((row.x - 800) / spacing) * spacing;
    for (let mark = first; mark &lt;= row.x + 1600; mark += spacing) {
      const y = config.carY - (mark - row.x) * config.alongScale;
      if (y &lt; -20 || y &gt; 520) continue;
      const line = document.createElementNS(svgNs, &#x27;line&#x27;);
      line.setAttribute(&#x27;class&#x27;, &#x27;vms-ground-line&#x27;);
      line.setAttribute(&#x27;x1&#x27;, &#x27;42&#x27;);
      line.setAttribute(&#x27;x2&#x27;, &#x27;678&#x27;);
      line.setAttribute(&#x27;y1&#x27;, y.toFixed(2));
      line.setAttribute(&#x27;y2&#x27;, y.toFixed(2));
      ground.appendChild(line);
      const label = document.createElementNS(svgNs, &#x27;text&#x27;);
      label.setAttribute(&#x27;class&#x27;, &#x27;vms-ground-label&#x27;);
      label.setAttribute(&#x27;x&#x27;, &#x27;48&#x27;);
      label.setAttribute(&#x27;y&#x27;, (y - 5).toFixed(2));
      label.textContent = `${(mark / 1000).toFixed(1)} m`;
      ground.appendChild(label);
    }
  }

  function drawTrail(rowIndex, current) {
    const start = Math.max(0, rowIndex - 500);
    const points = [];
    for (let cursor = start; cursor &lt;= rowIndex; cursor += 4) {
      const past = rows[cursor];
      const x = config.centerX + past.rearY * config.lateralScale;
      const y = config.carY + (current.x - past.x) * config.alongScale;
      if (y &lt;= 510) points.push(`${points.length === 0 ? &#x27;M&#x27; : &#x27;L&#x27;}${x.toFixed(2)},${y.toFixed(2)}`);
    }
    trail.setAttribute(&#x27;d&#x27;, points.join(&#x27; &#x27;));
  }

  function render() {
    const row = rows[Math.max(0, Math.min(index, rows.length - 1))];
    const carX = config.centerX + row.rearY * config.lateralScale;
    drawGround(row);
    drawTrail(index, row);
    car.setAttribute(&#x27;transform&#x27;, `translate(${carX.toFixed(2)} ${config.carY}) rotate(${row.yawDeg.toFixed(3)})`);

    errorLine.setAttribute(&#x27;x1&#x27;, config.centerX);
    errorLine.setAttribute(&#x27;y1&#x27;, config.carY + 38);
    errorLine.setAttribute(&#x27;x2&#x27;, carX);
    errorLine.setAttribute(&#x27;y2&#x27;, config.carY + 38);
    errorLabel.setAttribute(&#x27;x&#x27;, ((config.centerX + carX) / 2).toFixed(2));
    errorLabel.setAttribute(&#x27;y&#x27;, config.carY + 57);
    errorLabel.setAttribute(&#x27;text-anchor&#x27;, &#x27;middle&#x27;);
    errorLabel.textContent = `${signed(row.rearY, 1)} mm`;

    sensorDots.forEach((dot) =&gt; {
      const bit = Number(dot.getAttribute(&#x27;data-bit&#x27;));
      dot.classList.toggle(&#x27;is-active&#x27;, (row.bitmap &amp; (1 &lt;&lt; bit)) !== 0);
    });
    liveNodes.time.textContent = `t ${row.time.toFixed(2)} s`;
    liveNodes.error.textContent = `后轴 ${signed(row.rearY, 1)} mm`;
    liveNodes.yaw.textContent = `yaw ${signed(row.yawDeg, 1)}°`;
    liveNodes.turn.textContent = `ω ${signed(row.wCommandDeg, 1)}°/s`;
    liveNodes.sensor.textContent = `探头 ${row.bitmap.toString(2).padStart(7, &#x27;0&#x27;)}`;
    timeline.value = String(index);
    timelineValue.textContent = `${row.time.toFixed(2)} / ${config.duration.toFixed(2)} s`;
    detail.textContent = `左轮 ${row.leftCommand.toFixed(0)} / ${row.leftActual.toFixed(0)} mm/s · 右轮 ${row.rightCommand.toFixed(0)} / ${row.rightActual.toFixed(0)} mm/s · 后轴估计 ${signed(row.rearEstimate, 1)} mm · ${row.sensorState}`;
  }

  function setPlaying(next) {
    playing = next;
    playButton.textContent = playing ? &#x27;暂停&#x27; : (index &gt;= rows.length - 1 ? &#x27;重播&#x27; : &#x27;播放&#x27;);
    if (playing) {
      if (index &gt;= rows.length - 1) index = 0;
      lastFrame = null;
      cancelAnimationFrame(frameId);
      frameId = requestAnimationFrame(animate);
    } else {
      cancelAnimationFrame(frameId);
    }
  }

  function animate(timestamp) {
    if (!playing) return;
    if (lastFrame === null) lastFrame = timestamp;
    const elapsed = Math.min(0.1, (timestamp - lastFrame) / 1000);
    lastFrame = timestamp;
    const rate = Number(rateSelect.value);
    index = Math.min(rows.length - 1, index + Math.max(1, Math.round(elapsed * rate / config.dt)));
    render();
    if (index &gt;= rows.length - 1) {
      setPlaying(false);
      return;
    }
    frameId = requestAnimationFrame(animate);
  }

  function rebuild(autoPlay) {
    valueNodes.tau.textContent = `${controls.tau.value} ms`;
    valueNodes.delay.textContent = `${controls.delay.value} ms`;
    valueNodes.leftGain.textContent = `${controls.leftGain.value}%`;
    valueNodes.k1.textContent = (Number(controls.k1.value) / 100).toFixed(2);
    valueNodes.k2.textContent = (Number(controls.k2.value) / 100).toFixed(2);
    rows = simulate();
    timeline.max = String(rows.length - 1);
    index = 0;
    render();
    setPlaying(Boolean(autoPlay) &amp;&amp; !reduceMotion);
  }

  playButton.addEventListener(&#x27;click&#x27;, () =&gt; setPlaying(!playing));
  restartButton.addEventListener(&#x27;click&#x27;, () =&gt; rebuild(true));
  timeline.addEventListener(&#x27;input&#x27;, () =&gt; {
    setPlaying(false);
    index = Number(timeline.value);
    render();
  });
  [scenarioSelect, portSignSelect].forEach((control) =&gt; {
    control.addEventListener(&#x27;change&#x27;, () =&gt; rebuild(false));
  });
  Object.values(controls).forEach((control) =&gt; {
    control.addEventListener(&#x27;input&#x27;, () =&gt; rebuild(false));
  });
  rebuild(true);
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
